apiVersion: "nais.io/v1alpha1"
kind: "Application"
metadata:
  name: melosys-skjema-web
  namespace: teammelosys
  labels:
    team: teammelosys
spec:
  port: 8080
  ingresses:
    - https://melosys-skjema-web.intern.nav.no
  replicas:
    min: 2
    max: 4
    cpuThresholdPercentage: 50
  resources:
    limits:
      cpu: 1000m
      memory: 1024Mi
    requests:
      memory: 512Mi
  liveness:
    path: /internal/health/liveness
    initialDelay: 10
    periodSeconds: 5
    failureThreshold: 30
  readiness:
    path: /internal/health/readiness
    initialDelay: 10
    periodSeconds: 5
    failureThreshold: 30
  idporten:
    enabled: true
    sidecar:
      autoLogin: true
      enabled: true
      level: idporten-loa-high
      locale: nb
  tokenx:
    enabled: true
  accessPolicy:
    outbound:
      rules:
        - application: nav-dekoratoren
          namespace: personbruker
        - application: nav-dekoratoren-api
          namespace: personbruker
        - application: melosys-skjema-api
          namespace: teammelosys
      external:
        - host: nav.no
  prometheus:
    enabled: true
    path: internal/prometheus
  observability:
    logging:
      destinations:
        - id: loki
        - id: elastic
  env:
    - name: API_URL
      value: http://melosys-skjema-api/api
    - name: API_SCOPE
      value: prod-gcp:teammelosys:melosys-skjema-api
    - name: DEKORATOREN_API_URL
      value: https://www.nav.no/person/nav-dekoratoren-api
