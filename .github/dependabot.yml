version: 2

registries:
  npm-github:
    type: npm-registry
    url: https://npm.pkg.github.com
    token: ${{ secrets.READER_TOKEN }}
    replaces-base: false

updates:
  - package-ecosystem: npm
    directory: "/app"
    registries:
      - npm-github
    cooldown:
      default-days: 7
    schedule:
      interval: daily
    open-pull-requests-limit: 10
    groups:
      prod-minor-deps:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      dev-minor-deps:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
  - package-ecosystem: npm
    directory: "/server"
    registries:
      - npm-github
    cooldown:
      default-days: 7
    schedule:
      interval: daily
    open-pull-requests-limit: 10
    groups:
      prod-minor-deps:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      dev-minor-deps:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
  - package-ecosystem: github-actions
    directory: "/"
    cooldown:
      default-days: 7
    schedule:
      interval: daily
    open-pull-requests-limit: 10
