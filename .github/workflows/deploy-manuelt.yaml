name: Deploy manuelt
on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Miljø (dev eller prod)'
        required: true
        default: 'dev'

permissions:
  contents: write
  packages: write
  id-token: write

env:
  IMAGE: europe-north1-docker.pkg.dev/nais-management-233d/teammelosys/melosys-skjema-web:${{ github.sha }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  check_docker_image_exists:
    name: Sjekk om Docker-image eksisterer i registry
    runs-on: ubuntu-latest
    steps:
      - name: Login to NAIS registry
        uses: nais/login@v0
        with:
          team: teammelosys
      - name: Check if image exists
        id: check_image
        run: |
          if docker pull ${{ env.IMAGE }} >/dev/null 2>&1; then
            echo "Image eksisterer i registry"
            echo "image_exists=true" >> $GITHUB_OUTPUT
          else
            echo "Image eksisterer ikke i registry"
            echo "image_exists=false" >> $GITHUB_OUTPUT
          fi
    outputs:
      exists: ${{ steps.check_image.outputs.image_exists }}

  build:
    name: Build og push Docker image
    runs-on: ubuntu-latest
    needs: check_docker_image_exists
    if: needs.check_docker_image_exists.outputs.exists != 'true'
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: https://npm.pkg.github.com/
          scope: '@navikt'
      - uses: pnpm/action-setup@v5
      - name: Install app dependencies
        run: pnpm install --frozen-lockfile
        working-directory: app
        env:
          NODE_AUTH_TOKEN: ${{ secrets.READER_TOKEN }}
      - name: Build app
        run: pnpm build
        working-directory: app
        env:
          BASE_PATH: /medlemskap-lovvalg/soknad/
      - name: Install server dependencies
        run: pnpm install --frozen-lockfile
        working-directory: server
        env:
          NODE_AUTH_TOKEN: ${{ secrets.READER_TOKEN }}
      - name: Build server deploy artifact
        run: pnpm build:ci
        working-directory: server
        env:
          NODE_AUTH_TOKEN: ${{ secrets.READER_TOKEN }}
      - name: Build and push Docker image
        uses: nais/docker-build-push@v0
        with:
          team: teammelosys
          docker_context: .
          dockerfile: server/Dockerfile
          project_id: ${{ vars.NAIS_MANAGEMENT_PROJECT_ID }}
          identity_provider: ${{ secrets.NAIS_WORKLOAD_IDENTITY_PROVIDER }}
          tag: |
            type=raw,value=latest,priority=9001
            type=raw,value=${{ github.sha }},priority=9000
          platforms: linux/amd64,linux/arm64

  deploy:
    runs-on: ubuntu-latest
    needs: [build, check_docker_image_exists]
    if: always() && (needs.build.result == 'success' || needs.build.result == 'skipped')
    steps:
      - name: Set deploy target (dev)
        if: github.event.inputs.environment != 'prod'
        run: |
          echo "CLUSTER=dev-gcp" >> $GITHUB_ENV
          echo "RESOURCE=.nais/nais-dev.yaml" >> $GITHUB_ENV
      - name: Set deploy target (prod)
        if: github.event.inputs.environment == 'prod'
        run: |
          echo "CLUSTER=prod-gcp" >> $GITHUB_ENV
          echo "RESOURCE=.nais/nais-prod.yaml" >> $GITHUB_ENV
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Deploy til ${{ github.event.inputs.environment }}
        uses: nais/deploy/actions/deploy@v2
        env:
          CLUSTER: ${{ env.CLUSTER }}
          RESOURCE: ${{ env.RESOURCE }}
          WORKLOAD_IMAGE: ${{ env.IMAGE }}
      - name: Get commit message
        run: echo "COMMIT_MSG=$(git log --format=%s -n 1)" >> $GITHUB_ENV
      - name: Slack Notification
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_COLOR: "${{ job.status == 'success' && 'good' || 'danger' }}"
          SLACK_USERNAME: Github Actions
          SLACK_ICON: https://github.com/github.png?size=48
          SLACK_TITLE: "melosys-skjema-web ${{ job.status == 'success' && 'ble deployet' || 'kunne ikke deployes' }} til ${{ github.event.inputs.environment }}"
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_MESSAGE: ${{ env.COMMIT_MSG }}
