name: deploy-dev
on:
  push:
    paths-ignore:
      - "**.md"
      - ".gitignore"
      - "LICENSE"
      - "CODEOWNERS"
    branches:
      - main
permissions:
  contents: write
  packages: write
  id-token: write
env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
jobs:
  build:
    name: Build app and push docker image to GAR
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.docker-push.outputs.image }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          registry-url: https://npm.pkg.github.com/
          scope: '@navikt'
      - uses: pnpm/action-setup@v5
      - name: Install app dependencies
        run: pnpm install --frozen-lockfile
        working-directory: app
        env:
          NODE_AUTH_TOKEN: ${{ secrets.READER_TOKEN }}
      - name: Build app
        run: pnpm build
        working-directory: app
        env:
          BASE_PATH: /medlemskap-lovvalg/soknad/
      - name: Install server dependencies
        run: pnpm install --frozen-lockfile
        working-directory: server
        env:
          NODE_AUTH_TOKEN: ${{ secrets.READER_TOKEN }}
      - name: Build server deploy artifact
        run: pnpm build:ci
        working-directory: server
        env:
          NODE_AUTH_TOKEN: ${{ secrets.READER_TOKEN }}
      - name: Build and push Docker image
        uses: nais/docker-build-push@v0
        id: docker-push
        with:
          team: teammelosys
          docker_context: .
          dockerfile: server/Dockerfile
          project_id: ${{ vars.NAIS_MANAGEMENT_PROJECT_ID }}
          identity_provider: ${{ secrets.NAIS_WORKLOAD_IDENTITY_PROVIDER }}
          tag: |
            type=raw,value=latest,priority=9001
            type=raw,value=${{ github.sha }},priority=9000
          platforms: linux/amd64,linux/arm64

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout latest code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: pre-deploy
        uses: navikt/digihot-deploy/actions/pre-deploy@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Deploy til dev-gcp
        uses: nais/deploy/actions/deploy@v2
        env:
          CLUSTER: dev-gcp
          RESOURCE: .nais/nais-dev.yaml
          WORKLOAD_IMAGE: ${{ needs.build.outputs.image }}
      - name: Get commit message
        run: echo "COMMIT_MSG=$(git log --format=%s -n 1)" >> $GITHUB_ENV
      - name: Slack Notification
        if: always()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_COLOR: "${{ job.status == 'success' && 'good' || 'danger' }}"
          SLACK_USERNAME: Github Actions
          SLACK_ICON: https://github.com/github.png?size=48
          SLACK_TITLE: "melosys-skjema-web ${{ job.status == 'success' && 'ble deployet' || 'kunne ikke deployes' }} til dev-gcp"
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_MESSAGE: ${{ env.COMMIT_MSG }}
      - name: post-deploy
        uses: navikt/digihot-deploy/actions/post-deploy@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: draft release
        uses: softprops/action-gh-release@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ env.VERSION_TAG }}
          name: ${{ env.APPLICATION }} ${{ env.VERSION_TAG }}
          body: ${{ env.CHANGE_LOG }}
          draft: true
          prerelease: false

  trigger-e2e-tests:
    name: Trigger E2E tests
    runs-on: ubuntu-latest
    needs: [ build, deploy ]
    if: always() && (needs.deploy.result == 'success' || needs.deploy.result == 'skipped')
    steps:
      - name: Checkout latest code
        uses: actions/checkout@v7
      - name: Get commit message
        run: echo "COMMIT_MSG=$(git log --format=%s -n 1)" >> $GITHUB_ENV
      - name: Trigger E2E tests in melosys-e2e-tests
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.E2E_TRIGGER_PAT }}
          repository: navikt/melosys-e2e-tests
          event-type: melosys-skjema-web-published
          client-payload: |
            {
              "repository": "melosys-skjema-web",
              "image_tag": "${{ github.sha }}",
              "commit_sha": "${{ github.sha }}",
              "commit_message": "${{ env.COMMIT_MSG }}",
              "actor": "${{ github.actor }}"
            }
